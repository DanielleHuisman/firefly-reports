name: CI

on:
    pull_request: {}
    push:
        branches:
            - main

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false

jobs:
    commits:
        name: Commits
        uses: NixySoftware/.github/.github/workflows/commits.yml@69872c1a394b92973a42797e1bd19441722101bc # v0.5.0

        permissions:
            contents: read
            packages: read

    rust:
        name: Rust
        uses: NixySoftware/.github/.github/workflows/rust.yml@69872c1a394b92973a42797e1bd19441722101bc # v0.5.0

    typescript:
        name: TypeScript
        uses: NixySoftware/.github/.github/workflows/typescript.yml@69872c1a394b92973a42797e1bd19441722101bc # v0.5.0

        with:
            enable-lint: false
            enable-dependencies: false
            enable-test: false

    build:
        name: Build
        needs:
            - rust
            - typescript
        if: ${{ github.ref == 'refs/heads/main' }}
        runs-on: ubuntu-latest

        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

            - name: Sanitize repository owner
              uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
              id: repository_owner
              with:
                  result-encoding: string
                  script: return '${{ github.repository_owner }}'.toLowerCase()

            - name: Sanitize repository slug
              uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
              id: repository_slug
              with:
                  result-encoding: string
                  script: return '${{ github.repository }}'.toLowerCase()

            - name: Login to GitHub Container Registry
              uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Set up QEMU
              uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

            - name: Docker cache
              id: cache
              uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
              with:
                  key: docker-rust-${{ hashFiles('Cargo.lock') }}
                  path: |
                      docker-cargo-registry
                      docker-sccache
                  restore-keys: |
                      docker-rust-${{ hashFiles('Cargo.lock') }}
                      docker-rust-

            - name: Inject cache into Docker
              uses: reproducible-containers/buildkit-cache-dance@5422eac04292c961a382e0f584ea0f03ad9da723 # v3.4.0
              with:
                  cache-map: |
                      {
                        "docker-cargo-registry": "/usr/local/cargo/registry",
                        "docker-sccache": "/sccache"
                      }
                  skip-extraction: ${{ steps.cache.outputs.cache-hit }}

            - name: Docker metadata
              id: meta
              uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
              with:
                  images: ghcr.io/${{ steps.repository_slug.outputs.result }}
                  tags: |
                      type=sha,prefix=,format=long

            - name: Build and push
              uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
              with:
                  build-args: |
                      RELEASE=${{ github.sha }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  context: .
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}

    publish:
        name: Publish
        needs:
            - build
        if: ${{ github.ref == 'refs/heads/main' }}
        runs-on: ubuntu-latest

        steps:
            - name: Login to GitHub Container Registry
              uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Sanitize repository slug
              uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
              id: repository_slug
              with:
                  result-encoding: string
                  script: return '${{ github.repository }}'.toLowerCase()

            - name: Tag Docker images as latest
              env:
                  DOCKER_IMAGE: ghcr.io/${{ steps.repository_slug.outputs.result }}
              run: |
                  docker pull $DOCKER_IMAGE:$GITHUB_SHA
                  docker tag $DOCKER_IMAGE:$GITHUB_SHA $DOCKER_IMAGE:latest
                  docker push $DOCKER_IMAGE:latest
