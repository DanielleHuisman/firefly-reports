[package]
name = "firefly-reports-api"
publish = false

authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
version.workspace = true

[features]
default = ["server"]
server = [
    "dep:firefly-iii",
    "dep:itertools",
    "dep:secrecy",
    "dep:shield-dioxus-axum",
    "dep:shield-memory",
    "dep:shield-oauth",
    "dioxus/server",
]

[dependencies]
anyhow.workspace = true
dioxus = { workspace = true, features = ["fullstack"] }
firefly-iii = { git = "https://github.com/NixySoftware/firefly-iii", rev = "9b7192b", features = [
    "bon",
], optional = true }
itertools = { workspace = true, optional = true }
rust_decimal.workspace = true
secrecy = { version = "0.10.3", optional = true }
serde.workspace = true
shield.workspace = true
shield-dioxus-axum = { workspace = true, optional = true }
shield-memory = { workspace = true, optional = true }
shield-oauth = { workspace = true, optional = true }

[lints]
workspace = true
