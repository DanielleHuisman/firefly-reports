[package]
name = "firefly-reports-web"
publish = false

authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
version.workspace = true

[features]
default = []
web = ["dioxus/web"]
server = [
    "dep:axum",
    "dep:shield",
    "dep:shield-dioxus-axum",
    "dep:shield-memory",
    "dep:shield-oauth",
    "dep:tower-sessions",
    "shield-dioxus/server",
    "dioxus/server",
    "firefly-reports-api/server",
]

[dependencies]
axum = { version = "0.8.9", optional = true }
dioxus = { workspace = true, features = ["router", "fullstack"] }
firefly-reports-api.workspace = true
icu = "2.2.0"
itertools.workspace = true
rust_decimal.workspace = true
shield = { workspace = true, optional = true }
shield-bootstrap = { workspace = true, features = ["dioxus"] }
shield-dioxus.workspace = true
shield-dioxus-axum = { workspace = true, optional = true }
shield-memory = { workspace = true, optional = true, features = [
    "method-oauth",
] }
shield-oauth = { workspace = true, optional = true }
tower-sessions = { version = "0.15.0", optional = true }

[lints]
workspace = true
